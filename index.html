<!DOCTYPE html>
<html>
<head>
<title>Easy Nature Match</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #a8e6cf;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  aspect-ratio: 1;
  font-size: 26px;
  background: white;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<h2>🌿 Easy Nature Match</h2>

<p>Lives: <span id="lives">❤️❤️❤️❤️❤️❤️❤️</span></p>
<p>Matches: <span id="count">0</span>/12</p>

<div class="grid" id="grid"></div>

<script>
const items=["🌊","🌳","🌸","🍀","🌼","🌵"];
let grid=[],revealed=[],selected=[];
let lives=7,count=0;

function createGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[]; revealed=[]; selected=[];

  for(let i=0;i<25;i++){
    grid.push(items[Math.floor(Math.random()*items.length)]);
    revealed.push(false);

    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerText="⬜";
    cell.onclick=()=>clickCell(i);

    g.appendChild(cell);
  }

  preview();
}

function preview(){
  const cells=document.querySelectorAll(".cell");

  cells.forEach((cell,i)=>{
    cell.innerText=grid[i];
  });

  setTimeout(()=>{
    cells.forEach(cell=>cell.innerText="⬜");
  },3000);
}

function clickCell(i){
  const cells=document.querySelectorAll(".cell");
  if(revealed[i]) return;

  revealed[i]=true;
  cells[i].innerText=grid[i];
  selected.push(i);

  if(selected.length===3){
    check();
  }
}

function check(){
  const [a,b,c]=selected;

  if(grid[a]===grid[b] && grid[a]===grid[c]){
    count++;
    document.getElementById("count").innerText=count;
  } else {
    lives--;
    document.getElementById("lives").innerText="❤️".repeat(lives);
  }

  /* ⏳ SLOWER RESET (2 seconds) */
  setTimeout(reset,2000);

  if(lives<=0){
    alert("Game Over");
    location.reload();
  }

  if(count>=12){
    alert("You Win!");
    location.reload();
  }
}

function reset(){
  const cells=document.querySelectorAll(".cell");
  selected.forEach(i=>{
    revealed[i]=false;
    cells[i].innerText="⬜";
  });
  selected=[];
}

createGrid();
</script>

</body>
</html>
