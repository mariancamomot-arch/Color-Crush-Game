<!DOCTYPE html>
<html>
<head>
<title>Nature Match (Click to Reveal)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #a8e6cf;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  aspect-ratio: 1;
  font-size: 26px;
  background: white;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #4caf50;
  color: white;
}
</style>
</head>

<body>

<h2>🌿 Nature Match</h2>

<p>Lives: <span id="lives">❤️❤️❤️❤️❤️❤️❤️</span></p>
<p>Matches: <span id="count">0</span>/12</p>

<button onclick="resetTiles()">🔄 Reset Tiles</button>

<div class="grid" id="grid"></div>

<script>
const items=["🌊","🌳","🌸","🍀","🌼","🌵"];
let grid=[],revealed=[],selected=[];
let lives=7,count=0;

/* CREATE GRID */
function createGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[]; revealed=[]; selected=[];

  for(let i=0;i<25;i++){
    grid.push(items[Math.floor(Math.random()*items.length)]);
    revealed.push(false);

    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerText="⬜";
    cell.onclick=()=>clickCell(i);

    g.appendChild(cell);
  }
}

/* CLICK TILE */
function clickCell(i){
  const cells=document.querySelectorAll(".cell");

  if(revealed[i]) return;

  revealed[i]=true;
  cells[i].innerText=grid[i];
  selected.push(i);

  if(selected.length===3){
    check();
  }
}

/* CHECK MATCH */
function check(){
  const [a,b,c]=selected;

  if(grid[a]===grid[b] && grid[a]===grid[c]){
    count++;
    document.getElementById("count").innerText=count;

    // keep matched tiles open
    selected=[];
  } else {
    lives--;
    document.getElementById("lives").innerText="❤️".repeat(lives);

    // keep tiles open (no auto reset)
  }

  if(lives<=0){
    alert("Game Over");
    location.reload();
  }

  if(count>=12){
    alert("You Win!");
    location.reload();
  }
}

/* RESET BUTTON */
function resetTiles(){
  const cells=document.querySelectorAll(".cell");

  selected.forEach(i=>{
    revealed[i]=false;
    cells[i].innerText="⬜";
  });

  selected=[];
}

/* START GAME */
createGrid();
</script>

</body>
</html>
