<!DOCTYPE html>
<html>
<body style="text-align:center;font-family:Arial;">

<h1>Color Match Game 🎮</h1>

<p><b>HOW TO PLAY:</b> Click the ball that matches the color below 👇</p>

<h2 id="targetText">RED</h2>

<p>Score: <span id="score">0</span> | Lives: <span id="lives">3</span></p>

<canvas id="gameCanvas" width="400" height="300" style="border:2px solid black;"></canvas>

<script>
let score = 0;
let lives = 3;

const colors = ["red","blue","green"];
let target = "red";
let balls = [];

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function createBalls() {
  balls = [];
  for (let i = 0; i < 4; i++) { // fewer balls (easier)
    balls.push({
      x: Math.random()*350,
      y: Math.random()*250,
      color: colors[Math.floor(Math.random()*colors.length)]
    });
  }
}

function drawBalls() {
  balls.forEach(b => {
    ctx.beginPath();
    ctx.fillStyle = b.color;
    ctx.arc(b.x, b.y, 20, 0, Math.PI*2);
    ctx.fill();
  });
}

canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  balls.forEach(b => {
    let dx = mx - b.x;
    let dy = my - b.y;

    if (Math.sqrt(dx*dx+dy*dy) < 20) {

      if (b.color === target) {
        score++;
      } else {
        lives--;
      }

      if (lives <= 0) {
        alert("Game Over!");
        location.reload();
      }

      newRound();
    }
  });
});

function newRound() {
  target = colors[Math.floor(Math.random()*colors.length)];
  document.getElementById("targetText").innerText = target.toUpperCase();
  document.getElementById("score").innerText = score;
  document.getElementById("lives").innerText = lives;
  createBalls();
}

function gameLoop() {
  ctx.clearRect(0,0,400,300);
  drawBalls();
  requestAnimationFrame(gameLoop);
}

newRound();
gameLoop();
</script>

</body>
</html>
